# Travis CI配置文件
# 用于自动化构建、测试和部署

language: node_js
node_js:
  - '16'
  - '18'
  - '20'

# 指定使用pnpm包管理器
install:
  - npm install -g pnpm
  - pnpm install

# 运行构建和检查命令
script:
  - pnpm run build
  - pnpm run format:check

# 缓存node_modules以加速构建
cache:
  directories:
    - ~/.pnpm-store

# 仅在master分支上运行CI
branches:
  only:
    - master

# 通知配置
notifications:
  email:
    on_success: change
    on_failure: always
